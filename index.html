<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
   
    <TITLE>Mystical Fairy Jam Information</TITLE>
     
    <style>
    body {
    padding:0;
      margin: 0;
      background-color:rgb(253, 206, 242)
    }

    #princess{
      height:50vh;
    }

 @media (max-width: 479px) {
    #princess{
      width:100vw;
      height:50vh;
      overflow:hidden;
    }
}
     .bottom-center {
      position:absolute;
      top:40%;
      left:50%;
      width:100%;
      transform: translate(-50%,-50%);
      text-align: center;
      font-size: 2rem;
      font-family:cursive;
      color:white;
      padding:10px;
    }

    #button_type {
       
      width:30rem;
  border-radius: 20px;
  line-height: 20px;
  background: white;
  border: 3px solid #bcafff;
  margin:10px;
      font-size: 1.5rem;
  display: flex;
      align-items: center;
      gap:1rem;
      padding:15px;
      color:black;
      text-decoration: none;
  /* flex-direction: column; --used to stack on top*/
          }

  #bimg{ 
          
    width: 75px;
  height: 75px;
  border-radius: 50%;
  object-fit: cover;
  
    
    }

    
#icon{height:7rem; width:7rem;
}

    .item {
      font-size: 5rem;
        font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center; 
    }

   

    .icons{ 
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      padding-top: 0px;
      padding-bottom: 10px;
   
    }

     #gradient{ 
     mask:radial-gradient(110.26% 96% at 50% 0%, #000 50%,
 rgba(0, 0, 0, 0.99) 54.68%, rgba(0, 0, 0, 0.97) 58.79%, rgba(0, 0, 0, 0.94) 62.4%,
 rgba(0, 0, 0, 0.90) 65.61%, rgba(0, 0, 0, 0.85) 68.52%, rgba(0, 0, 0, 0.79) 71.2%,
rgba(0, 0, 0, 0.72) 73.75%, rgba(0, 0, 0, 0.65) 76.25%, rgba(0, 0, 0, 0.57) 78.8%, 
rgba(0, 0, 0, 0.48) 81.48%, rgba(0, 0, 0, 0.39) 84.39%, rgba(0, 0, 0, 0.30) 87.6%,
rgba(0, 0, 0, 0.20) 91.21%,rgba(0, 0, 0, 0.10) 95.32%, rgba(0, 0, 0, 0.00) 100%);
 display:flex;
             justify-content: center;
    }
   
</style>



</head>
<body>
<div id="first">
  <div id=gradient>


    <img id="princess" 
      src="./princessvibes.jpg" alt="MysticalFairyJam Official: TikTok, Instagram, Youtube" >

  </div>
  <h1 class="bottom-center"> Mystical Fairy Jam </h1>

</div>


<div class="icons">

  <a href="https://www.instagram.com/mysticalfairyjam">
    <img id="icon" src="./instagram_logo.png">
  </a>

  <a href="https://www.tiktok.com/@mysticalfairyjam">
    <img  id="icon" src="./tiktok_logo.png">
  </a>

  <a href="https://www.youtube.com/@mysticalfairyjam">
    <img  id="icon" src="./youtube_logo.png">
  </a>
</div>

<div id= buttons>
  <div class="item">

    <a id=button_type  href="https://aestheticspreadsheet.etsy.com">
      
      <img id="bimg" src="./spreadsheet.png">
      
      Check out my Aesthetic Spreadsheets on my Etsy Shop!
      
    </a>

  </div>  
</div> 
 
</body>
</html>
